<!-- DOCTYPE this is the first tag on the page and it tells the browser that this is an HTML5
page -->
<!DOCTYPE html>
<!-- the html tag goes next -->
<html>
    <!-- the head section has info gor the browser and search engine -->
    <head>
      <!-- the title tag is what shows up in the browser tab -->
      <title>CSC102 Home Page</title>
    </head>

    <!-- the body tag is where all the content of the page goes -->
     <body
        <!-- the h1 tag is a heading -->
        <!-- the p tag is a paragraph -->
        <h1>Welcome to My CSC102 Home Page.</h1>
        <!-- p is paragraph tag; has spacing around it by default -->
        <p>
            <!-- img is the image tag -->
            <img id="shorseImage" src="shorse.jpg">
        </p>
    </body>
</html>
